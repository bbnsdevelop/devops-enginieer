apiVersion: v1
kind: Pod
metadata:
  name: nginx-init-container
  namespace: default
spec:
  containers:
  - name: nginx-init-container
    image: nginx:1.14.2
    ports:
    - containerPort: 80
  initContainers:
  - name: waitfordns
    image: busybox:1.28
    command:
      - sh
      - -c
      - until nslookup mysqlsql; do echo "Trying to resolver..."; sleep 1; done